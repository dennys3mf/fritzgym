{% extends 'base.html' %}

{% block title %}{{ maquina.nombre }} - Fritz Gym{% endblock %}

{% block style %}
<style>
    .contenedor-detalle { text-align: center; }
    .video-responsive { position: relative; overflow: hidden; padding-top: 56.25%; border-radius: 8px; margin-top: 20px;
        border: 2px solid #444;
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
    }
    .video-responsive iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    .back-link {
        display: inline-block;
        margin-top: 30px;
        padding: 10px 20px;
        background-color: var(--color-primario);
        color: #000;
        text-decoration: none;
        font-family: 'Oswald', sans-serif;
        text-transform: uppercase;
        border-radius: 4px;
        font-weight: 700;
        transition: background-color 0.2s;
    }
    .back-link:hover {
        background-color: #fff;
    }
</style>
{% endblock %}

{% block content %}
    <div class="contenedor-detalle">
        <a href="{% url 'lista-maquinas' %}" class="back-link">Volver a la Lista</a>
        <h1>{{ maquina.nombre }}</h1>
        <p>{{ maquina.descripcion|linebreaks }}</p>

        <div class="video-responsive">
            <iframe
                src="{{ maquina.url_video }}"
                title="Video de {{ maquina.nombre }}"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
            </iframe>
        </div>
    </div>
{% endblock %}
